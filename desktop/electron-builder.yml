# electron-builder packaging config — see https://www.electron.build/
#
# Produces unsigned installers. Code-signing needs paid Apple /
# Microsoft developer accounts; until then users get a one-time
# "unidentified developer" prompt (right-click → Open on macOS;
# "More info → Run anyway" on Windows).
appId: com.oshoarchives.app
productName: Osho Archives
copyright: Osho Archives

directories:
  output: dist
  buildResources: build

# `app/` is the bundled static frontend — CI copies frontend/out into
# it before packaging. node_modules for runtime deps (serve-handler)
# is included automatically.
files:
  - main.js
  - package.json
  - app/**/*

mac:
  target: dmg
  category: public.app-category.reference

win:
  target: nsis

linux:
  target: AppImage
  category: Education
