# electron-builder packaging config — see https://www.electron.build/
#
# Produces unsigned installers. Code-signing needs paid Apple /
# Microsoft developer accounts; until then users get a one-time
# "unidentified developer" prompt (right-click → Open on macOS;
# "More info → Run anyway" on Windows).
appId: com.oshoarchives.app
productName: Osho Archives
copyright: Osho Archives

directories:
  output: dist
  buildResources: build

# `asar: false` — keep the app as plain files rather than an asar
# archive. The bundled corpus is ~550 MB; serving it (and reading it
# back) is simplest and most reliable straight off the filesystem.
asar: false

# `app/` is the bundled static frontend plus the corpus at
# app/corpus/osho.db.zst — CI populates it before packaging.
# node_modules for runtime deps (serve-handler) is included
# automatically.
files:
  - main.js
  - preload.js
  - package.json
  - app/**/*

mac:
  target: dmg
  category: public.app-category.reference

win:
  target: nsis

linux:
  target: AppImage
  category: Education
