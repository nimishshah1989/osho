name: Build desktop app

# Builds the Osho Archives desktop installers (.dmg for macOS, .exe
# for Windows) on GitHub's native runners — desktop installers can
# only be built on their target OS.
#
# Manual trigger only. After a run finishes, download the installers
# from the run's "Artifacts" section.

on:
  workflow_dispatch:

jobs:
  # Gate: prove the offline archive actually opens before we spend time
  # building installers. This builds the real static export and drives it
  # through the real desktop server in headless Chromium (Electron's
  # renderer IS Chromium) — installing + opening the corpus via the OPFS
  # SAHPool VFS and running a real query. If the archive can't be opened
  # (the app would show "Couldn't set up the archive"), the whole workflow
  # fails and no installers are produced.
  verify-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build the static frontend (same as the installer build)
        working-directory: frontend
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          rm -rf app/api app/ask
          DESKTOP_BUILD=true npx next build
      - name: Install desktop deps + Chromium
        working-directory: desktop
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Check all runtime-required modules are packaged
        working-directory: desktop
        run: npm run check:bundle
      - name: Verify the offline archive opens end-to-end
        working-directory: desktop
        run: npm run verify:offline

  build:
    needs: verify-offline
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build the frontend as a static export. `shell: bash` so the
      # rm / env-var syntax works on the Windows runner too.
      #
      # `--ignore-scripts`: the frontend has `better-sqlite3` as a *test*
      # devDependency, whose install script compiles a native module via
      # node-gyp — which fails on the Windows runner. The static export
      # never uses better-sqlite3, so skipping all install scripts is
      # both safe and what unblocks the Windows build.
      - name: Build frontend (static export)
        shell: bash
        working-directory: frontend
        run: |
          npm install --ignore-scripts
          rm -rf app/api app/ask
          DESKTOP_BUILD=true npx next build

      # Stage the static frontend inside the desktop project so
      # electron-builder bundles it.
      - name: Stage frontend into desktop app
        shell: bash
        run: |
          rm -rf desktop/app
          cp -r frontend/out desktop/app

      # Bundle the offline corpus inside the installer. Pulled from the
      # stable `corpus-latest` GitHub release (server-side download — no
      # CORS in play). The app's local server serves it at /corpus/...
      - name: Bundle the offline corpus
        shell: bash
        run: |
          mkdir -p desktop/app/corpus
          curl -fL --retry 3 --retry-delay 5 \
            -o desktop/app/corpus/osho.db.zst \
            "https://github.com/nimishshah1989/osho/releases/download/corpus-latest/osho.db.zst"
          ls -lh desktop/app/corpus/osho.db.zst

      - name: Build installer
        shell: bash
        working-directory: desktop
        run: |
          npm install
          npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: osho-archives-${{ matrix.os }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.exe
          if-no-files-found: error
