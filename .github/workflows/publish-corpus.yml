name: Publish offline corpus

# Builds the compressed SQLite corpus on the E2E VPS and replaces the
# asset attached to the `corpus-latest` release. The PWA's
# `NEXT_PUBLIC_CORPUS_URL` points at that asset, so this workflow is
# what keeps the offline corpus in lockstep with the live API DB.
#
# Triggers:
#   - Manual via Actions UI (workflow_dispatch). Used after a big
#     archival edit when you want the offline copy refreshed
#     immediately.
#   - Nightly at 02:00 UTC. The build takes ~1-2 min and the
#     upload depends on the link between the VPS and GitHub.
#
# Secrets required on the repo:
#   BACKEND_SSH_KEY — its public half must be in `osho`'s
#   authorized_keys on the VPS (also used by deploy-backend.yml).
#   GITHUB_TOKEN — provided by Actions automatically and has
#   contents:write on this repo when permissions are set below.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Build + publish corpus from the VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Forwarded into the remote shell via the action's
          # `envs` directive so the script can authenticate gh and
          # know which repo to publish to.
          GH_TOKEN_FOR_RELEASE: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Host + user are not secrets (public infra, see CLAUDE.md);
          # only the SSH key is.
          host: 164.52.223.241
          username: osho
          key: ${{ secrets.BACKEND_SSH_KEY }}
          envs: GH_TOKEN_FOR_RELEASE
          script: |
            set -euo pipefail
            # Non-interactive SSH shells don't source ~/.bashrc, so
            # $HOME/bin is off PATH by default. The sponsor-owned VPS
            # ships gh as a user-local binary at ~/bin/gh (installed
            # 2026-05-27 to avoid needing sudo on a box where the `osho`
            # user has no passwordless apt) — this export makes it
            # visible to every command in this script.
            export PATH="$HOME/bin:$PATH"
            cd /home/osho/osho
            git fetch origin main
            git reset --hard origin/main

            # gh and zstd must already be on the box. We no longer try
            # to auto-install — the previous sudo-apt path silently
            # 12s-timed-out on the new VPS for five nights running
            # because the `osho` user has no passwordless apt. Fail
            # loudly here so the failure mode is "install gh and re-run"
            # instead of an opaque timeout.
            for tool in gh zstd; do
              if ! command -v "$tool" >/dev/null 2>&1; then
                echo "ERROR: $tool is not on PATH. Install it on the VPS:" >&2
                echo "  - zstd:  sudo apt-get install -y zstd" >&2
                echo "  - gh:    download from https://github.com/cli/cli/releases" >&2
                echo "           and place the binary at ~/bin/gh" >&2
                exit 1
              fi
            done

            # Authenticate gh with the forwarded GitHub Actions token.
            export GH_TOKEN="$GH_TOKEN_FOR_RELEASE"
            export GH_REPO="${{ github.repository }}"
            bash scripts/publish_corpus.sh
