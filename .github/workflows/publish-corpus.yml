name: Publish offline corpus

# Builds the compressed SQLite corpus on the EC2 backend host and
# replaces the asset attached to the `corpus-latest` release. The
# PWA's `NEXT_PUBLIC_CORPUS_URL` points at that asset, so this
# workflow is what keeps the offline corpus in lockstep with the
# live API DB.
#
# Triggers:
#   - Manual via Actions UI (workflow_dispatch). Used after a big
#     archival edit when you want the offline copy refreshed
#     immediately.
#   - Nightly at 02:00 UTC. The build takes ~1-2 min and the
#     upload depends on the link between EC2 and GitHub.
#
# Secrets required on the repo:
#   BACKEND_HOST, BACKEND_USER, BACKEND_SSH_KEY (already used by
#   deploy-backend.yml).
#   GITHUB_TOKEN — provided by Actions automatically and has
#   contents:write on this repo when permissions are set below.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Build + publish corpus from EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Forwarded into the remote shell via the action's
          # `envs` directive so the script can authenticate gh and
          # know which repo to publish to.
          GH_TOKEN_FOR_RELEASE: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ${{ secrets.BACKEND_USER }}
          key: ${{ secrets.BACKEND_SSH_KEY }}
          port: ${{ secrets.BACKEND_PORT || 22 }}
          envs: GH_TOKEN_FOR_RELEASE
          script: |
            set -euo pipefail
            cd /home/ubuntu/osho-speaks
            git fetch origin main
            git reset --hard origin/main

            # Install gh CLI on first run if missing. Cheap idempotent
            # install via the official APT repo. zstd is checked
            # independently so a host with gh but missing zstd doesn't
            # silently skip the install (the build would then fail
            # later inside scripts/build_corpus_artifact.sh).
            if ! command -v gh >/dev/null 2>&1; then
              type -p curl >/dev/null || sudo apt-get install -y curl
              curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
              sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
                | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
              sudo apt-get update
              sudo apt-get install -y gh
            fi
            if ! command -v zstd >/dev/null 2>&1; then
              sudo apt-get install -y zstd
            fi

            # Authenticate gh with the forwarded GitHub Actions token.
            export GH_TOKEN="$GH_TOKEN_FOR_RELEASE"
            export GH_REPO="${{ github.repository }}"
            bash scripts/publish_corpus.sh
