name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'scripts/cloud_api.py'
      - 'scripts/build_fts.py'
      - 'scripts/ingest_docx.py'
      - 'scripts/deploy.sh'
      - 'requirements.txt'
      - 'data/**'
      - '.github/workflows/deploy-backend.yml'

# Serialise ALL VPS deploys (backend AND frontend) under one shared group.
# Both workflows SSH into the same box and `git pull` the same checkout; run
# concurrently (a merge touching both halves) they raced on the pull and
# silently failed the frontend deploy (#111, #112). A shared group queues
# them instead of running git operations side-by-side. Must match the
# `group:` in deploy-frontend.yml.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run server-side deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          # The E2E VPS. Host + user are not secrets (the IP is public
          # infra, documented in CLAUDE.md); only the SSH key is. The
          # box's authorized_keys must hold the public half of
          # BACKEND_SSH_KEY for user `osho`.
          host: 164.52.223.241
          username: osho
          key: ${{ secrets.BACKEND_SSH_KEY }}
          # All deploy logic lives in scripts/deploy.sh on the server so we
          # never need to re-edit this workflow. The script:
          #   1. git pull
          #   2. pip install (if requirements.txt changed)
          #   3. rebuild FTS index (if build_fts.py or data/** changed)
          #   4. restart osho-backend.service (systemd)
          #   5. curl /health and exit non-zero if it doesn't return 200
          script: |
            set -euo pipefail
            cd /home/osho/osho
            bash scripts/deploy.sh
