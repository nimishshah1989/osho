name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'scripts/cloud_api.py'
      - 'scripts/build_fts.py'
      - 'scripts/ingest_docx.py'
      - 'scripts/deploy.sh'
      - 'requirements.txt'
      - 'data/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run server-side deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ${{ secrets.BACKEND_USER }}
          key: ${{ secrets.BACKEND_SSH_KEY }}
          port: ${{ secrets.BACKEND_PORT || 22 }}
          # All deploy logic lives in scripts/deploy.sh on the server so we
          # never need to re-edit this workflow. The script:
          #   1. git pull
          #   2. pip install (if requirements.txt changed)
          #   3. rebuild FTS index (if build_fts.py or data/** changed)
          #   4. restart uvicorn
          #   5. curl /health and exit non-zero if it doesn't return 200
          script: |
            set -euo pipefail
            cd /home/ubuntu/osho-speaks
            bash scripts/deploy.sh
