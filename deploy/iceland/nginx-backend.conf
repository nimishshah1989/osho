# /etc/nginx/sites-available/osho-backend
#
# Reverse proxies api.oshoarchives.com → uvicorn on 127.0.0.1:8000.
# Cloudflare-only ingress, same as the frontend.

include /etc/nginx/cloudflare-ips.conf;
real_ip_header CF-Connecting-IP;

geo $realip_remote_addr $is_cloudflare {
    default 0;
    include /etc/nginx/cloudflare-ranges.conf;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.oshoarchives.com;

    if ($is_cloudflare = 0) {
        return 403;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # Search queries against the 1.6 GB FTS index can take a few seconds
    # for cross-paragraph NEAR. Be generous but not infinite.
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Admin ingest pastes whole discourses
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    access_log /var/log/nginx/osho-backend.access.log;
    error_log  /var/log/nginx/osho-backend.error.log;
}
