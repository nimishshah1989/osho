# /etc/nginx/sites-available/osho-frontend
#
# Reverse proxies the public web to the Next.js process running under PM2
# on 127.0.0.1:3000. Only accepts traffic from Cloudflare IP ranges —
# direct hits to this server's IP get 403.
#
# The set_real_ip_from list is rewritten by deploy/iceland/refresh-cloudflare-ips.sh
# (run nightly by cron). Don't edit /etc/nginx/cloudflare-ips.conf by hand.

# Trusted Cloudflare IPs (rewritten by refresh-cloudflare-ips.sh)
include /etc/nginx/cloudflare-ips.conf;

# Pull real client IP from the Cloudflare-set header instead of the edge IP
real_ip_header CF-Connecting-IP;

# Reject anything that didn't come through Cloudflare
geo $is_cloudflare {
    default 0;
    include /etc/nginx/cloudflare-ranges.conf;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name oshoarchives.com www.oshoarchives.com;

    # Block non-Cloudflare origins (after certbot adds TLS this becomes 443 too)
    if ($is_cloudflare = 0) {
        return 403;
    }

    # Standard reverse-proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Tight timeouts on the public hop. The slow path is in the backend.
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Larger body for the admin ingest endpoint
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
    }

    # Let's Encrypt HTTP-01 challenge — must be reachable WITHOUT Cloudflare proxy
    # so certbot can verify the domain. The location matches before the
    # is_cloudflare check applies.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    access_log /var/log/nginx/osho-frontend.access.log;
    error_log  /var/log/nginx/osho-frontend.error.log;
}
