# /etc/nginx/sites-available/osho
#
# Single-VPS config: both vhosts on one box.
#   __DOMAIN__         → Next.js on 127.0.0.1:3000
#   __API_DOMAIN__     → FastAPI on 127.0.0.1:8000
#
# __DOMAIN__ and __API_DOMAIN__ are substituted by 02-setup-single-vps.sh
# before this file is copied into /etc/nginx/sites-available/.
#
# Ingress is Cloudflare-only (other source IPs get 403). Cloudflare IP
# ranges are kept fresh nightly by refresh-cloudflare-ips.sh.

include /etc/nginx/cloudflare-ips.conf;
real_ip_header CF-Connecting-IP;

geo $is_cloudflare {
    default 0;
    include /etc/nginx/cloudflare-ranges.conf;
}

# -- Frontend ----------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    if ($is_cloudflare = 0) {
        return 403;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    access_log /var/log/nginx/osho-frontend.access.log;
    error_log  /var/log/nginx/osho-frontend.error.log;
}

# -- Backend (API) -----------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name __API_DOMAIN__;

    if ($is_cloudflare = 0) {
        return 403;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # Cross-paragraph NEAR queries can take a few seconds
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    access_log /var/log/nginx/osho-backend.access.log;
    error_log  /var/log/nginx/osho-backend.error.log;
}

# -- Catch-all (reject anything that didn't match a known server_name) -------

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}
