<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background — matches the dark theme of oshoarchives.com.  -->
  <rect width="512" height="512" fill="#1a1410" rx="96" ry="96"/>
  <!-- Gold inner border, subtle. -->
  <rect x="24" y="24" width="464" height="464" rx="72" ry="72"
        fill="none" stroke="#d4af37" stroke-width="2" opacity="0.35"/>
  <!-- ॐ glyph — Devanagari OM, the natural mark for an Osho app.
       Font fallback chain reaches Noto Sans Devanagari and the
       system Devanagari fonts. -->
  <text x="256" y="356"
        text-anchor="middle"
        font-family="'Noto Sans Devanagari', 'Mangal', 'Sanskrit Text', serif"
        font-size="360"
        font-weight="500"
        fill="#d4af37">ॐ</text>
</svg>
