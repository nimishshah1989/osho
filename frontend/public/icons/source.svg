<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark rounded-square background, matching the app theme. -->
  <rect width="512" height="512" fill="#1a1410" rx="96" ry="96"/>
  <!-- Subtle gold inner border. -->
  <rect x="24" y="24" width="464" height="464" rx="72" ry="72"
        fill="none" stroke="#d4af37" stroke-width="2" opacity="0.35"/>
  <!-- Typographic "O" — a ring with thicker sides than top/bottom,
       giving it the stress of a drawn letterform rather than a plain
       geometric circle. -->
  <circle cx="256" cy="256" r="148" fill="#d4af37"/>
  <ellipse cx="256" cy="256" rx="86" ry="104" fill="#1a1410"/>
</svg>
